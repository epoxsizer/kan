stages:
  - check
  - release

variables:
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"

cache:
  key: go-$CI_COMMIT_REF_SLUG
  paths:
    - .cache/go-build
    - .cache/go-mod

check:
  stage: check
  image: golang:1.22
  script:
    - go mod verify
    - test -z "$(gofmt -l cmd internal)"
    - CGO_ENABLED=0 go vet ./...
    - CGO_ENABLED=0 go test -coverprofile=coverage.out ./...
    - CGO_ENABLED=0 go build -trimpath -o bin/kan ./cmd/kan
  artifacts:
    when: always
    paths:
      - bin/kan
      - coverage.out
    expire_in: 1 week

release:
  stage: release
  image:
    name: goreleaser/goreleaser:v2.16.0
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
    GITLAB_TOKEN: "$GORELEASER_GITLAB_TOKEN"
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - goreleaser release --clean
