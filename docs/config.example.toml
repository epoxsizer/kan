# Copy next to the kan executable as config.toml and uncomment values to override defaults.

database = "kan.db"
log_file = "kan.log"
log_level = "info"
# show_card_tags = true
# show_selected_card_details = false

[mcp]
# Disabled by default. When enabled, Kan serves Streamable HTTP on /mcp.
enabled = false
address = "127.0.0.1:7337"
# Prefer setting KAN_MCP_TOKEN instead of storing the token here.
token = ""

[planning]
stale_after_days = 7
blocked_tags = ["blocked", "blocker"]
untriaged_without_priority = true

[sync]
# Set enabled to true to synchronize the portable JSON export while Kan is open.
enabled = false
interval = "10m"
object_key = "kan/sync.json"

[sync.s3]
bucket = ""
region = ""
# Leave empty for AWS S3, or set an S3-compatible endpoint such as https://s3.example.com.
endpoint = ""
# Keep this file private (mode 0600) and never commit real credentials.
access_key_id = ""
secret_access_key = ""
force_path_style = false

